# Config locale / CLI — requis pour `npm run db:push` après `supabase link`.
# Adapte major_version à ton instance : Dashboard → Settings → Database → Postgres version.

project_id = "fitmangas5"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
enable_signup = true

[storage]
enabled = true
file_size_limit = "50MiB"
